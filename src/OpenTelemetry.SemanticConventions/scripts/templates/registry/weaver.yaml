params:

  semconv_version: "1.41.0"
  semconv_commit: "e018fe6f91862f5ed63c082f87697cddac596784"
  schema_url: "https://opentelemetry.io/schemas/1.41.0"

  # excluded attributes will not be generated
  # this behavior is fully controlled by jinja templates
  excluded_attributes: ["messaging.client_id", "otel.library.name", "otel.library.version"]

whitespace_control:
  trim_blocks: true
  lstrip_blocks: true
  keep_trailing_newline: true

comment_formats:
  csharp:
    format: html
    header: "/// <summary>"
    prefix: "/// "
    footer: "/// </summary>"
    old_style_paragraph: true
    omit_closing_li: false
    inline_code_snippet: "<c>{{code}}</c>"
    block_code_snippet: "<code>{{code}}</<code>"
    trim: true
    remove_trailing_dots: false
    enforce_trailing_dots: true
default_comment_format: csharp

templates:
  - pattern: SemanticConventionsAttributes.cs.j2
    filter: >
      semconv_grouped_attributes({
        "exclude_deprecated": false,
        "exclude_stability": [],
      }) | map({
          package_name: "OpenTelemetry.SemanticConventions",
          namespace: "OpenTelemetry.SemanticConventions",
          root_namespace: .root_namespace,
          attributes: (.attributes | map(select(.name as $attribute_name | (($excluded_attributes | index($attribute_name)) | not) and (.stability == "stable") and (.deprecated == null)))),
          excluded_attributes: $excluded_attributes
      }) | map(select(.attributes | length > 0))
    application_mode: each
  - pattern: SemanticConventionsAttributes.cs.j2
    filter: >
      semconv_grouped_attributes({
        "exclude_deprecated": false,
        "exclude_stability": [],
      }) | map({
          package_name: "OpenTelemetry.SemanticConventions.Incubating",
          namespace: "OpenTelemetry.SemanticConventions.Incubating",
          root_namespace: .root_namespace,
          attributes: (.attributes | map(select(.name as $attribute_name | (($excluded_attributes | index($attribute_name)) | not) and ((.stability != "stable") or (.deprecated != null))))),
          excluded_attributes: $excluded_attributes
      }) | map(select(.attributes | length > 0))
    application_mode: each
  - pattern: SchemaUrl.cs.j2
    filter: >
      [
        {
          package_name: "OpenTelemetry.SemanticConventions",
          namespace: "OpenTelemetry.SemanticConventions",
          schema_url: $schema_url
        },
        {
          package_name: "OpenTelemetry.SemanticConventions.Incubating",
          namespace: "OpenTelemetry.SemanticConventions.Incubating",
          schema_url: $schema_url
        }
      ]
    application_mode: each
  - pattern: SchemaVersion.cs.j2
    filter: >
      [
        {
          package_name: "OpenTelemetry.SemanticConventions",
          namespace: "OpenTelemetry.SemanticConventions",
          semconv_version: $semconv_version
        },
        {
          package_name: "OpenTelemetry.SemanticConventions.Incubating",
          namespace: "OpenTelemetry.SemanticConventions.Incubating",
          semconv_version: $semconv_version
        }
      ]
    application_mode: each

text_maps:
  csharp_type:
    int: int
    double: double
    boolean: bool
    string: string
    string[]: List<string>
    int[]: List<int>
    double[]: List<double>
    boolean[]: List<bool>
