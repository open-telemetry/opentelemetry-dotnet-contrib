file_format: definition/2
# schema reference: https://github.com/open-telemetry/weaver/blob/v0.23.0/schemas/semconv-syntax.v2.md

# import upstream db client span and associated attributes
imports:
  spans:
    - span.db.client

# define redis-specific attribute
attributes:
  - key: db.redis.database_index
    stability: development
    type: int
    brief: Logical database index.
    examples: [0, 1]

# extend db.client with new attribute
span_refinements:
  - id: span.db.client.redis
    ref: db.client
    attributes:
      - ref: db.redis.database_index
        requirement_level: recommended
