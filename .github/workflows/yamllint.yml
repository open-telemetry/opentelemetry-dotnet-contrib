name: Lint - YAML

on:
  workflow_call:

permissions:
  contents: read

jobs:
  run-yamllint:
    name: Run yamllint
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        filter: 'tree:0'
        persist-credentials: false
        show-progress: false

    - name: Run yamllint
      run: yamllint --no-warnings .
