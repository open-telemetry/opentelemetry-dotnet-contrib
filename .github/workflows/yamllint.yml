name: Lint - YAML

on:
  workflow_call:

permissions:
  contents: read

jobs:
  run-yamllint:
    name: Run yamllint
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        filter: 'tree:0'
        persist-credentials: false
        show-progress: false

    - name: Run yamllint
      run: yamllint --no-warnings .
