name: Dependency Submission (NuGet)

on:
  push:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  submit-nuget:
    name: Submit NuGet dependency snapshot
    if: github.event.repository.fork == false
    runs-on: windows-2025
    timeout-minutes: 10

    permissions:
      contents: write # Submit the generated dependency snapshot to the repository dependency graph
      id-token: write # Authenticate the dependency submission with GitHub OIDC

    steps:
      - name: Update agent configuration
        shell: pwsh
        run: |
          "DOTNET_INSTALL_DIR=D:\tools\dotnet" >> ${env:GITHUB_ENV}
          "DOTNET_ROOT=D:\tools\dotnet" >> ${env:GITHUB_ENV}
          "NUGET_PACKAGES=D:\.nuget\packages" >> ${env:GITHUB_ENV}

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          filter: 'tree:0'
          persist-credentials: false
          show-progress: false

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Component detection
        uses: advanced-security/component-detection-dependency-submission-action@b876b8cc341a53970394b33ea0ca4e86c25542de # v0.1.3
        with:
          detectorsCategories: NuGet
