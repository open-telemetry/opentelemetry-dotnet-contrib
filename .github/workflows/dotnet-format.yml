name: Lint - dotnet format

on:
  workflow_call:

permissions:
  contents: read

jobs:
  run-dotnet-format:
    name: Run dotnet format
    runs-on: windows-2025

    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0
        persist-credentials: false
        show-progress: false

    - name: Setup .NET
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0

    - name: dotnet format
      shell: pwsh
      run: |
        $formatArgs = @(
          'opentelemetry-dotnet-contrib.slnx',
          '--verify-no-changes'
        )

        $baseRef = if (${env:GITHUB_BASE_REF}) { "origin/${env:GITHUB_BASE_REF}" } else { "HEAD~1" }
        $changedFiles = git diff --name-only "${baseRef}...HEAD"

        if ($changedFiles -contains 'global.json') {
          Write-Output "global.json was changed - checking all files."
        } else {
          $csFiles = $changedFiles | Where-Object { $_ -match '\.cs$' }

          if (-not $csFiles) {
            Write-Output "No C# files changed - skipping dotnet format."
            exit 0
          }

          Write-Output "Checking: $csFiles"
          $formatArgs += @('--include', $csFiles)
        }

        dotnet format $formatArgs
